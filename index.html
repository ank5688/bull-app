<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for bull-app">
  <link rel="icon" href="bull-icon-color.png">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    #demo {
      margin: var(--ddd-spacing-2);
    }
    bull-app {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
    }
    bull-app:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
    #example {
      --bull-app-font-size: var(--ddd-font-size-l);
      background-color: var(--ddd-accent-2);
      color: var(--ddd-primary-17);
    }
  </style>
  <title>Bull Poker Leauge</title>
</head>

<body>
  <bull-playlist></bull-playlist>
  <script type="module" src="./bull-playlist.js"></script>
  <div id="demo">
    <h1>bull-app</h1>
    <!-- this is going to do whatever the tag's defaults are -->
    <h2>Default</h2>
    <bull-app></bull-app>
    <h2>Slot usage</h2>
    <bull-app data-accent="2" data-primary="17"><div>Sample slot content</div></bull-app>
    <h2>Property usage</h2>
    <bull-app id="example" title="Sample property title"></bull-app>
  </div>
  <script type="module" src="./bull-app.js"></script>

</body>
</html>
